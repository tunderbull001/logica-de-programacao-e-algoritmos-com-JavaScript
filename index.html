<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Financiamento Moto</title>
    <link rel="stylesheet" href="arquivoCss/arquivo.css">
</head>
<body>
    <h1 id="tituloPrincipal">Simulador Financiamento Moto </h1>

    <h4>Entrada de Dados:</h4>

    <form>
    <p>
        Valor da moto:
        <input type="number"  id="inp_valorMoto">
    </p>

    <p>
        Valor da entrada:
        <input type="number"  id="inp_valorDaEntrada">
    </p>

    <p>
        Quantidade de Parcelas:
        <input type="number"  id="inp_qtdParcelas">
    </p>

    <input type="submit" value="ENVIAR" id="botaoSubmit">

    <br><br>
    <h4>Saída de Dados</h4> 
    

    <p id="out.valorFinanciado">
        Valor Financiado:
    </p>

    <p id="out.valorTotalComJuros">
        Valor Total com Juros:
    </p>

    <p id="out.valorDaParcela">
        Valor da Parcela:
    </p>

    <p id="out.taxaDeJurosAtual">
        Taxa de juros Atual:
    </p>





    </form>
    <script src="arquivosJs/arquivo.js"></script>
</body>
</html>
